<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Format</title>
    <link rel="stylesheet" href="./github-dark.min.css">
    <style>
        body { font-family: "Consolas", "Monaco", sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        pre { background: #1e1e1e; padding: 10px; border: 1px solid #333; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Python Standard Codes</h1>
    
    <div class="code-loader" data-title="std" data-src="./codes/std.py"></div>
    <div class="code-loader" data-title="cv" data-src="./codes/cv.py"></div>
    <div class="code-loader" data-title="fm" data-src="./codes/fm.py"></div>
    <div class="code-loader" data-title="oth" data-src="./codes/oth.py"></div>

    <script src="./highlight.min.js"></script>
    <script>
        // .code-loaderクラスを持つすべての要素を取得し、それぞれに処理を行います
        document.querySelectorAll('.code-loader').forEach(container => {
            const title = container.dataset.title; // data-title を取得
            const src = container.dataset.src;     // data-src を取得

            // 枠組みとなるHTMLを生成
            container.innerHTML = `<h2>${title}</h2><pre><code class="language-python">Loading...</code></pre>`;
            const codeBlock = container.querySelector('code');

            fetch(src)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ERROR: ${response.status}`);
                    return response.text();
                })
                .then(text => {
                    codeBlock.textContent = text; 
                    hljs.highlightElement(codeBlock);
                })
                .catch(error => {
                    codeBlock.textContent = `Read ERROR: ${error.message}. Do "python3.xx -m http.server"`;
                });
        });
    </script>
</body>
</html>
